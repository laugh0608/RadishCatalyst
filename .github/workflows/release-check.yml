name: Release Checks

on:
  push:
    tags:
      - 'v*-dev'
      - 'v*-test'
      - 'v*-release'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check repository hygiene
        shell: pwsh
        run: ./scripts/check-text-files.ps1
