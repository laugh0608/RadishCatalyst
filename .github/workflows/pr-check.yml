name: PR Checks

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check repository hygiene
        shell: pwsh
        run: ./scripts/check-text-files.ps1
